<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background Rounded Square for Tab Clarity -->
  <rect width="512" height="512" rx="112" fill="#0f172a" />
  
  <!-- Detonator Icon Group scaled and centered -->
  <g transform="translate(106, 86) scale(3)">
    <!-- Plunger Handle and Shaft -->
    <rect x="22" y="14" width="56" height="8" rx="2" fill="#f8fafc" />
    <rect x="20" y="10" width="3" height="16" rx="1.5" fill="#f8fafc" />
    <rect x="77" y="10" width="3" height="16" rx="1.5" fill="#f8fafc" />
    <rect x="47" y="22" width="6" height="30" fill="#f8fafc" />
    <rect x="44" y="48" width="12" height="4" rx="1" fill="#f8fafc" />
    
    <!-- Binding Posts -->
    <rect x="33" y="47" width="5" height="5" rx="1" fill="#f8fafc" />
    <rect x="62" y="47" width="5" height="5" rx="1" fill="#f8fafc" />
    
    <!-- Lid plate -->
    <rect x="25" y="52" width="50" height="5" rx="1.5" fill="#f8fafc" />
    
    <!-- Detonator Box Cabinet (H-shape in our portfolio theme brand) -->
    <!-- Colored with the signature brand color: #e4943f -->
    <rect x="28" y="57" width="10" height="49" rx="1.5" fill="#e4943f" />
    <rect x="62" y="57" width="10" height="49" rx="1.5" fill="#e4943f" />
    <rect x="38" y="78" width="24" height="8" fill="#e4943f" />
    
    <!-- Rivet details -->
    <circle cx="33" cy="62" r="1.5" fill="#0f172a" />
    <circle cx="67" cy="62" r="1.5" fill="#0f172a" />
    <circle cx="33" cy="101" r="1.5" fill="#0f172a" />
    <circle cx="67" cy="101" r="1.5" fill="#0f172a" />
    
    <!-- Base plate -->
    <rect x="25" y="106" width="50" height="5" rx="1.5" fill="#f8fafc" />
  </g>
